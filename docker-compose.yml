services:
  cerbos:
    image: ghcr.io/cerbos/cerbos:0.51.0
    ports:
      - "3592:3592"
      - "3593:3593"
    volumes:
      - ./policies:/policies
    command:
      - "server"
      - "--set=storage.driver=disk"
      - "--set=storage.disk.directory=/policies"
      - "--set=audit.enabled=true"
      - "--set=audit.backend=file"
      - "--set=audit.file.path=stdout"
